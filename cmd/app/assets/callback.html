<!DOCTYPE html>
<html>
<head>
    <title>Autenticando...</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="loader">
    <div class="spinner"></div>
    <p>Autenticando...</p>
</div>

<script>
    // Nota: Token JWT agora está em HttpOnly cookie (não na URL)
    // This é mais seguro - não pode ser acessado por JavaScript
    // O servidor envia automaticamente em futuras requisições

    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');

    if (error) {
        console.error('Erro de autenticação:', error);
        window.location.href = '/?error=' + encodeURIComponent(error);
    } else {
        // Sucesso! Token está em cookie HttpOnly
        // Notificar app nativo (se disponível)
        if (window.AndroidInterface && typeof window.AndroidInterface.onLoginSuccess === 'function') {
            try {
                console.log('Notificando app nativo sobre login bem-sucedido...');
                window.AndroidInterface.onLoginSuccess();
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } catch (e) {
                console.error('Erro ao chamar Android interface:', e);
                window.location.href = '/';
            }
        } else {
            // Fallback: redirecionar para home
            console.log('Token recebido via cookie HttpOnly, redirecionando...');
            window.location.href = '/';
        }
    }
</script>
</body>
</html>
