services:
  topstrem:
    build: .
    image: topstrem
    container_name: topstrem
    restart: unless-stopped
    ports:
      - "${PORT}:8080"
    networks:
      - app_network
      - docker_default
    env_file:
      - .env
    environment:
      - PORT=${PORT}
      - ENVIRONMENT=${ENVIRONMENT}
      - REDIS_ADDR=${REDIS_ADDR}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: topstrem-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
  docker_default:
    external: true